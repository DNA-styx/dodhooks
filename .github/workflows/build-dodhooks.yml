name: build_dodhooks

on:
  push:
    branches: [ master ]
    tags: [ v** ]
    paths:
      - '**'
      - '!README.md'
      - '!LICENSE'
      - '!.github/workflows/build-dodhooks.yml'
  pull_request:
    branches: [ master ]
    paths:
      - '**'
      - '!README.md'
      - '!LICENSE'
      - '!.github/workflows/build-dodhooks.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        include:
          - os: ubuntu-latest
            os_short: linux
            compiler_cc: clang
            compiler_cxx: clang++
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      SDKS: '["dods"]'
      ARCH: x86,x86_64
      SMVERSION: '1.10'
      MMVERSION: '1.10'

    steps:
      # Checkout everything
      - uses: actions/checkout@v4
        name: Checkout dodhooks
        with:
          path: 'dodhooks'

      - uses: actions/checkout@v4
        name: Checkout ambuild
        with:
          repository: 'alliedmodders/ambuild'
          path: 'ambuild'

      - uses: actions/checkout@v4
        name: Checkout sourcemod
        with:
          repository: 'alliedmodders/sourcemod'
          path: 'sourcemod'
          ref: "${{ env.SMVERSION }}-dev"
          submodules: 'recursive'

      # Setup Python for AMBuild
      - uses: actions/setup-python@v5
        name: Setup Python 3.8
        with:
          python-version: '3.8'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install ambuild
        shell: bash
        run: pip install ./ambuild

      - name: Install Linux SM dependencies
        shell: bash
        if: startsWith(runner.os, 'Linux')
        run: ./sourcemod/tools/checkout-deps.sh -s ${{ join(fromJSON(env.SDKS)) }}

      - name: Install Windows SM dependencies
        shell: pwsh
        if: startsWith(runner.os, 'Windows')
        run: ./sourcemod/tools/checkout-deps.ps1 -SDKs ${{ join(fromJSON(env.SDKS)) }}

      - name: Install Linux dependencies
        if: startsWith(runner.os, 'Linux')
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-multilib g++-multilib libstdc++6 lib32stdc++6 \
            libc6-dev libc6-dev-i386 linux-libc-dev \
            linux-libc-dev:i386 lib32z1-dev ${{ matrix.compiler_cc }}

      - uses: ilammy/msvc-dev-cmd@v1
        name: Install Windows dependencies
        if: startsWith(runner.os, 'Windows')

      - name: Select clang compiler
        if: startsWith(runner.os, 'Linux')
        run: |
          echo "CC=${{ matrix.compiler_cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.compiler_cxx }}" >> $GITHUB_ENV
          ${{ matrix.compiler_cc }} --version
          ${{ matrix.compiler_cxx }} --version

      - name: Create dodhooks build folder
        shell: bash
        working-directory: ./dodhooks
        run: mkdir build

      - name: Configure dodhooks build
        shell: bash
        working-directory: ./dodhooks/build
        run: python3 ../configure.py --hl2sdk-root=../../ --sm-path=../../sourcemod/ --mms-path=../../mmsource-${{ env.MMVERSION }}/

      - name: Run dodhooks build
        shell: bash
        working-directory: ./dodhooks/build
        run: ambuild

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.os }}-build"
          path: ./dodhooks/build
          retention-days: 1

  release:
    name: Release
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dodhooks
        uses: actions/checkout@v4
        with:
          path: 'dodhooks'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-latest-build
          path: build-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release/addons/sourcemod
          cp -rf dodhooks/sourcemod/* release/addons/sourcemod/
          cp -rf build-artifacts/package/addons/sourcemod/* release/addons/sourcemod/

      - name: Create release archive
        run: zip -r dodhooks.zip release/addons/

      - name: Create release
        if: ${{ !contains(github.ref, '-beta') }}
        uses: softprops/action-gh-release@v2
        with:
          files: dodhooks.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pre-release
        if: ${{ contains(github.ref, '-beta') }}
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: dodhooks.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}